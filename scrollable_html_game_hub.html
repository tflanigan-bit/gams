<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f1a;
    color: white;
    overflow-x: hidden;
  }

  h1 {
    text-align: center;
    padding: 20px;
  }

  #gameContainer {
    display: flex;
    flex-direction: column;
    gap: 30px;
    padding: 20px;
  }

  .game {
    background: #1a1a2e;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
  }

  .game iframe {
    width: 100%;
    height: 400px;
    border: none;
  }

  .title {
    padding: 10px;
    font-weight: bold;
  }

  #loader {
    text-align: center;
    padding: 20px;
    opacity: 0.7;
  }
</style>
</head>
<body>

<h1>🎮 Game Hub</h1>
<div id="gameContainer"></div>
<div id="loader">Loading more games...</div>

<script>
// 👇 ADD YOUR GAME FILES HERE
const games = [
  { title: "Game 1", file: "games/game1.html" },
  { title: "Game 2", file: "games/game2.html" },
  { title: "Game 3", file: "games/game3.html" },
  { title: "Game 4", file: "games/game4.html" },
  { title: "Game 5", file: "games/game5.html" },
  { title: "Game 6", file: "games/game6.html" },
  { title: "Game 7", file: "games/game7.html" },
  { title: "Game 8", file: "games/game8.html" }
];

let index = 0;
const batchSize = 2;
const container = document.getElementById("gameContainer");

function loadGames() {
  for (let i = 0; i < batchSize && index < games.length; i++, index++) {
    const game = games[index];

    const div = document.createElement("div");
    div.className = "game";

    div.innerHTML = `
      <div class="title">${game.title}</div>
      <iframe src="${game.file}" loading="lazy"></iframe>
    `;

    container.appendChild(div);
  }

  if (index >= games.length) {
    document.getElementById("loader").innerText = "No more games 🎉";
  }
}

// 👇 Infinite scroll trigger
window.addEventListener("scroll", () => {
  const scrollBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - 200;
  if (scrollBottom) {
    loadGames();
  }
});

// Initial load
loadGames();
</script>

</body>
</html>
